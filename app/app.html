<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Berashith Diseases & Sicknesses Database</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.95;
        }

        .search-section {
            padding: 30px;
            background: #f8f9fa;
            border-bottom: 2px solid #e9ecef;
        }

        .search-box {
            position: relative;
        }

        #searchInput {
            width: 100%;
            padding: 15px 20px 15px 50px;
            font-size: 1em;
            border: 2px solid #667eea;
            border-radius: 10px;
            transition: all 0.3s ease;
            background-image: url("data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24' fill='none' stroke='%23667eea' stroke-width='2'%3E%3Ccircle cx='11' cy='11' r='8'%3E%3C/circle%3E%3Cline x1='21' y1='21' x2='16.65' y2='16.65'%3E%3C/line%3E%3C/svg%3E");
            background-repeat: no-repeat;
            background-position: 15px center;
            background-size: 20px;
            padding-left: 50px;
        }

        #searchInput:focus {
            outline: none;
            border-color: #764ba2;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        #searchInput::placeholder {
            color: #999;
        }

        .results-section {
            padding: 30px;
            max-height: 700px;
            overflow-y: auto;
        }

        .results-section::-webkit-scrollbar {
            width: 8px;
        }

        .results-section::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        .results-section::-webkit-scrollbar-thumb {
            background: #667eea;
            border-radius: 4px;
        }

        .results-section::-webkit-scrollbar-thumb:hover {
            background: #764ba2;
        }

        .empty-state {
            text-align: center;
            padding: 60px 30px;
            color: #999;
        }

        .empty-state-icon {
            font-size: 4em;
            margin-bottom: 20px;
        }

        .empty-state p {
            font-size: 1.1em;
        }

        .disease-card {
            background: #f8f9fa;
            border-left: 4px solid #667eea;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 8px;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .disease-card:hover {
            background: #fff;
            border-left-color: #764ba2;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.15);
            transform: translateX(5px);
        }

        .disease-name {
            font-size: 1.4em;
            font-weight: 600;
            color: #667eea;
            margin-bottom: 10px;
        }

        .disease-section {
            margin-bottom: 15px;
        }

        .disease-section-title {
            font-weight: 600;
            color: #764ba2;
            font-size: 0.95em;
            text-transform: uppercase;
            margin-bottom: 5px;
            letter-spacing: 0.5px;
        }

        .disease-section-content {
            color: #333;
            line-height: 1.6;
            padding-left: 10px;
            border-left: 2px solid #e9ecef;
        }

        .no-results {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }

        .no-results-icon {
            font-size: 3em;
            margin-bottom: 15px;
        }

        .result-count {
            text-align: center;
            color: #666;
            font-size: 0.9em;
            margin-bottom: 20px;
            font-style: italic;
        }

        .highlight {
            background-color: #fff3cd;
            padding: 2px 4px;
            border-radius: 3px;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏥 Berashith Diseases & Sicknesses Database</h1>
            <p>Complete Medical & Spiritual Information for 359 Diseases</p>
        </div>

        <div class="search-section">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Search diseases, symptoms, roots, or recommendations...">
            </div>
        </div>

        <div class="results-section" id="results">
            <div class="empty-state">
                <div class="empty-state-icon">🔍</div>
                <p>Start typing to search for diseases and sicknesses...</p>
            </div>
        </div>
    </div>

    <script src="diseases-complete-359.js"></script>
    <script>
        const searchInput = document.getElementById('searchInput');
        const resultsContainer = document.getElementById('results');

        // Function to perform search
        function performSearch() {
            const query = searchInput.value.trim().toLowerCase();
            
            if (!query) {
                resultsContainer.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">🔍</div>
                        <p>Start typing to search for diseases and sicknesses...</p>
                    </div>
                `;
                return;
            }

            const results = DISEASES.filter(disease => {
                return disease.name.toLowerCase().includes(query) ||
                       disease.description.toLowerCase().includes(query) ||
                       disease.general.toLowerCase().includes(query) ||
                       disease.roots.toLowerCase().includes(query) ||
                       disease.recommendations.toLowerCase().includes(query);
            }).sort((a, b) => {
                const aNameMatch = a.name.toLowerCase().includes(query);
                const bNameMatch = b.name.toLowerCase().includes(query);
                if (aNameMatch && !bNameMatch) return -1;
                if (!aNameMatch && bNameMatch) return 1;
                return 0;
            });

            if (results.length === 0) {
                resultsContainer.innerHTML = `
                    <div class="no-results">
                        <div class="no-results-icon">😔</div>
                        <p>No diseases found matching "<strong>${escapeHtml(query)}</strong>"</p>
                        <p style="font-size: 0.9em; margin-top: 10px;">Try searching for body parts, symptoms, or conditions.</p>
                    </div>
                `;
                return;
            }

            let html = `<div class="result-count">Found ${results.length} result${results.length !== 1 ? 's' : ''}</div>`;
            
            results.forEach(disease => {
                html += `
                    <div class="disease-card">
                        <div class="disease-name">${escapeHtml(disease.name)}</div>
                        ${disease.description ? `
                            <div class="disease-section">
                                <div class="disease-section-title">Description</div>
                                <div class="disease-section-content">${escapeHtml(disease.description)}</div>
                            </div>
                        ` : ''}
                        ${disease.general ? `
                            <div class="disease-section">
                                <div class="disease-section-title">General Information</div>
                                <div class="disease-section-content">${escapeHtml(disease.general)}</div>
                            </div>
                        ` : ''}
                        ${disease.roots ? `
                            <div class="disease-section">
                                <div class="disease-section-title">Roots/Symptoms</div>
                                <div class="disease-section-content">${escapeHtml(disease.roots)}</div>
                            </div>
                        ` : ''}
                        ${disease.recommendations ? `
                            <div class="disease-section">
                                <div class="disease-section-title">Recommendations</div>
                                <div class="disease-section-content">${escapeHtml(disease.recommendations)}</div>
                            </div>
                        ` : ''}
                    </div>
                `;
            });

            resultsContainer.innerHTML = html;
        }

        // Function to escape HTML special characters
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Add event listener for search input
        searchInput.addEventListener('input', performSearch);
        searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                performSearch();
            }
        });

        // Initialization
        performSearch();  // Show empty state on load
    </script>
</body>
</html>
