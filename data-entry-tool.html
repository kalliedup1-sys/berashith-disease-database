<!-- Data Entry Tool - Paste Extracted Disease Data -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Disease Data Entry Tool</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f5f5f5; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { color: #333; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; color: #333; }
        textarea { width: 100%; padding: 10px; font-family: monospace; border: 1px solid #ddd; border-radius: 5px; }
        button { padding: 12px 30px; background: #667eea; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 1em; }
        button:hover { background: #764ba2; }
        .output { margin-top: 30px; background: white; padding: 20px; border-radius: 5px; }
        pre { background: #f9f9f9; padding: 15px; border-radius: 5px; overflow-x: auto; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 Disease Data Entry Tool</h1>
        <p>Paste your disease data in CSV format (Name, Cause, Symptoms, Description, Treatment, Tags, Page)</p>
        
        <div class="form-group">
            <label for="csvData">CSV Data (one disease per line):</label>
            <textarea id="csvData" rows="10" placeholder="Name,Cause,Symptoms,Description,Treatment,Tags,Page
Acute Respiratory Infection,Viral infection,Cough,Common disease,Supportive care,respiratory,20
Malaria,Mosquito,Fever,Parasitic disease,Antimalarials,tropical,21"></textarea>
        </div>
        
        <button onclick="convertToJSON()">Convert to JSON</button>
        
        <div class="output" id="output" style="display:none;">
            <h2>Generated JSON:</h2>
            <pre id="jsonOutput"></pre>
            <button onclick="copyJSON()">Copy JSON</button>
            <button onclick="downloadJSON()">Download JSON</button>
        </div>
    </div>

    <script>
        function convertToJSON() {
            const csvData = document.getElementById('csvData').value.trim();
            if (!csvData) {
                alert('Please paste CSV data first');
                return;
            }

            const lines = csvData.split('\n').filter(line => line.trim());
            const diseases = [];

            lines.forEach((line, index) => {
                const parts = line.split(',').map(p => p.trim());
                if (parts.length >= 7) {
                    diseases.push({
                        id: index + 1,
                        name: parts[0],
                        cause: parts[1],
                        symptoms: parts[2],
                        description: parts[3],
                        treatment: parts[4],
                        tags: parts[5].split('|').map(t => t.trim()),
                        page: parseInt(parts[6]) || 0
                    });
                }
            });

            const json = JSON.stringify(diseases, null, 2);
            document.getElementById('jsonOutput').textContent = json;
            document.getElementById('output').style.display = 'block';
        }

        function copyJSON() {
            const json = document.getElementById('jsonOutput').textContent;
            navigator.clipboard.writeText(json).then(() => {
                alert('✓ JSON copied to clipboard!');
            });
        }

        function downloadJSON() {
            const json = document.getElementById('jsonOutput').textContent;
            const blob = new Blob([json], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'diseases.json';
            a.click();
        }
    </script>
</body>
</html>
